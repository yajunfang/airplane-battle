<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>飞机大战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  width: 100%; height: 100%;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}
#gameContainer {
  position: relative;
  width: 100vw; height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  display: block;
  background: #0a0a1a;
  border: 2px solid #1a3a5c;
  border-radius: 4px;
  /* 自动适配屏幕，保持宽高比 */
  max-width: 100vw;
  max-height: 100vh;
  width: auto;
  height: auto;
  aspect-ratio: 480 / 720;
}
#ui {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  display: flex;
  justify-content: space-between;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: clamp(12px, 2.5vw, 16px);
  pointer-events: none;
  z-index: 10;
}
#ui .label { color: #8af; }
#ui .value { color: #ff0; font-weight: bold; }

/* 移动端虚拟控件 (仅触摸设备显示) */
#mobileControls {
  display: none;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  pointer-events: none;
  z-index: 5;
}
#mobileControls .hint {
  position: absolute;
  bottom: 15px;
  color: rgba(255,255,255,0.25);
  font-family: Arial, sans-serif;
  font-size: 12px;
  text-align: center;
  pointer-events: none;
}
#mobileControls .hint.left  { left: 20px; }
#mobileControls .hint.right { right: 20px; }

@media (hover: none) and (pointer: coarse) {
  #mobileControls { display: block; }
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="ui">
    <span><span class="label">分数</span> <span class="value" id="score">0</span></span>
    <span><span class="label">生命</span> <span class="value" id="lives">❤️❤️❤️</span></span>
    <span><span class="label">等级</span> <span class="value" id="level">1</span></span>
  </div>
  <div id="mobileControls">
    <span class="hint left">👆 滑动移动</span>
    <span class="hint right">🔫 自动射击</span>
  </div>
</div>

<script>
// ===================== 飞机大战 =====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 480, H = 720;

// 自适应画布大小
function resizeCanvas() {
  const container = document.getElementById('gameContainer');
  const maxW = container.clientWidth;
  const maxH = container.clientHeight;
  const scale = Math.min(maxW / W, maxH / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
canvas.width = W;
canvas.height = H;
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));
resizeCanvas();

// UI元素
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');

// 检测触摸设备
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// ========== 游戏状态 ==========
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, OVER: 3 };
let gameState = STATE.MENU;
let score = 0;
let lives = 3;
let level = 1;
let invincibleTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// ========== 星空背景 ==========
class Star {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -5;
    this.size = Math.random() * 2.5 + 0.5;
    this.speed = this.size * 1.5 + 0.5;
    this.brightness = Math.random() * 0.5 + 0.5;
  }
  update() {
    this.y += this.speed;
    if (this.y > H + 5) this.reset(false);
  }
  draw(ctx) {
    ctx.fillStyle = `rgba(200,220,255,${this.brightness})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

const stars = Array.from({ length: 80 }, () => new Star());

// ========== 粒子系统 ==========
class Particle {
  constructor(x, y, color, life) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4;
    this.color = color;
    this.life = life || 30;
    this.maxLife = this.life;
    this.size = Math.random() * 3 + 1;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life--; }
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  get dead() { return this.life <= 0; }
}

let particles = [];

function spawnExplosion(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color, 20 + Math.random() * 20));
  }
}

// ========== 子弹 ==========
class Bullet {
  constructor(x, y, dx, dy) {
    this.x = x; this.y = y;
    this.dx = dx || 0;
    this.dy = dy || -8;
    this.w = 3; this.h = 12;
    this.active = true;
  }
  update() {
    this.x += this.dx; this.y += this.dy;
    if (this.y < -20 || this.y > H + 20 || this.x < -20 || this.x > W + 20) this.active = false;
  }
  draw(ctx) {
    const grad = ctx.createLinearGradient(this.x, this.y - 6, this.x, this.y + 6);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#ff0');
    grad.addColorStop(1, '#f80');
    ctx.fillStyle = grad;
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 6;
    ctx.fillRect(this.x - this.w / 2, this.y - this.h / 2, this.w, this.h);
    ctx.shadowBlur = 0;
  }
}

let bullets = [];
let enemyBullets = [];
let bulletCooldown = 0;
const BULLET_INTERVAL = 12;

// ========== 道具 ==========
class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    this.w = 24; this.h = 24;
    this.vy = 2;
    this.timer = 0;
  }
  update() {
    this.y += this.vy;
    this.timer++;
    return this.y > H + 30;
  }
  draw(ctx) {
    const pulse = Math.sin(this.timer * 0.1) * 3;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(1 + pulse * 0.05, 1 + pulse * 0.05);
    const color = this.getColor();
    ctx.shadowColor = color;
    ctx.shadowBlur = 12 + pulse;
    ctx.fillStyle = color;
    // 兼容旧浏览器的手动圆角矩形
    const r = 6, hw = this.w / 2, hh = this.h / 2;
    ctx.beginPath();
    ctx.moveTo(-hw + r, -hh);
    ctx.lineTo(hw - r, -hh);
    ctx.arcTo(hw, -hh, hw, -hh + r, r);
    ctx.lineTo(hw, hh - r);
    ctx.arcTo(hw, hh, hw - r, hh, r);
    ctx.lineTo(-hw + r, hh);
    ctx.arcTo(-hw, hh, -hw, hh - r, r);
    ctx.lineTo(-hw, -hh + r);
    ctx.arcTo(-hw, -hh, -hw + r, -hh, r);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.getIcon(), 0, 1);
    ctx.restore();
  }
  getColor() {
    switch(this.type) {
      case 'double': return '#0ff';
      case 'shield': return '#0f0';
      case 'heal': return '#f0f';
      case 'bomb': return '#f80';
      default: return '#fff';
    }
  }
  getIcon() {
    switch(this.type) {
      case 'double': return '⚡';
      case 'shield': return '🛡';
      case 'heal': return '❤';
      case 'bomb': return '💣';
      default: return '★';
    }
  }
}

let powerUps = [];

// ========== 玩家 ==========
class Player {
  constructor() {
    this.x = W / 2;
    this.y = H - 80;
    this.w = 40; this.h = 48;
    this.speed = 5;
    this.shieldActive = false;
    this.shieldTimer = 0;
    this.doubleFire = false;
    this.doubleTimer = 0;
    this.engineFlame = 0;
  }

  reset() {
    this.x = W / 2;
    this.y = H - 80;
    this.shieldActive = false;
    this.shieldTimer = 0;
    this.doubleFire = false;
    this.doubleTimer = 0;
  }

  update(keys, touchDX, touchDY) {
    // 键盘移动
    if (keys['ArrowLeft'] || keys['KeyA']) this.x -= this.speed;
    if (keys['ArrowRight'] || keys['KeyD']) this.x += this.speed;
    if (keys['ArrowUp'] || keys['KeyW']) this.y -= this.speed;
    if (keys['ArrowDown'] || keys['KeyS']) this.y += this.speed;

    // 触摸相对移动（虚拟摇杆模式）
    if (touchDX !== 0 || touchDY !== 0) {
      this.x += touchDX * this.speed * 0.8;
      this.y += touchDY * this.speed * 0.8;
    }

    // 边界限制
    this.x = Math.max(this.w / 2, Math.min(W - this.w / 2, this.x));
    this.y = Math.max(this.h / 2, Math.min(H - this.h / 2, this.y));

    this.engineFlame = (this.engineFlame + 0.3) % (Math.PI * 2);

    // 道具计时
    if (this.doubleFire) {
      this.doubleTimer--;
      if (this.doubleTimer <= 0) this.doubleFire = false;
    }
    if (this.shieldActive) {
      this.shieldTimer--;
      if (this.shieldTimer <= 0) this.shieldActive = false;
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);

    // 护盾
    if (this.shieldActive) {
      ctx.strokeStyle = `rgba(0, 255, 100, ${0.5 + Math.sin(Date.now() * 0.01) * 0.3})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = '#0f0';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(0, 0, 32, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // 引擎火焰
    const flameLen = 10 + Math.sin(this.engineFlame) * 6;
    const flameGrad = ctx.createLinearGradient(0, 20, 0, 20 + flameLen);
    flameGrad.addColorStop(0, '#0cf');
    flameGrad.addColorStop(0.5, '#08f');
    flameGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(-8, 22);
    ctx.lineTo(0, 22 + flameLen);
    ctx.lineTo(8, 22);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-12, 18);
    ctx.lineTo(-6, 18 + flameLen * 0.6);
    ctx.lineTo(-4, 18);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 18);
    ctx.lineTo(6, 18 + flameLen * 0.6);
    ctx.lineTo(12, 18);
    ctx.fill();

    // 机身
    const bodyGrad = ctx.createLinearGradient(0, -24, 0, 24);
    bodyGrad.addColorStop(0, '#4af');
    bodyGrad.addColorStop(0.4, '#28f');
    bodyGrad.addColorStop(1, '#04a');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(0, -24);
    ctx.lineTo(10, -8);
    ctx.lineTo(14, 0);
    ctx.lineTo(14, 14);
    ctx.lineTo(10, 22);
    ctx.lineTo(-10, 22);
    ctx.lineTo(-14, 14);
    ctx.lineTo(-14, 0);
    ctx.lineTo(-10, -8);
    ctx.closePath();
    ctx.fill();

    // 高亮条
    ctx.strokeStyle = '#8df';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.lineTo(0, 18);
    ctx.stroke();

    // 机翼
    ctx.fillStyle = '#16c';
    ctx.beginPath();
    ctx.moveTo(-14, 2);
    ctx.lineTo(-28, 8);
    ctx.lineTo(-26, 14);
    ctx.lineTo(-14, 10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(14, 2);
    ctx.lineTo(28, 8);
    ctx.lineTo(26, 14);
    ctx.lineTo(14, 10);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#6cf';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-14, 3);
    ctx.lineTo(-26, 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(14, 3);
    ctx.lineTo(26, 8);
    ctx.stroke();

    // 尾翼
    ctx.fillStyle = '#059';
    ctx.beginPath();
    ctx.moveTo(-10, 18);
    ctx.lineTo(-18, 24);
    ctx.lineTo(-12, 24);
    ctx.lineTo(-6, 20);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, 18);
    ctx.lineTo(18, 24);
    ctx.lineTo(12, 24);
    ctx.lineTo(6, 20);
    ctx.closePath();
    ctx.fill();

    // 座舱
    const cockpitGrad = ctx.createRadialGradient(0, -10, 2, 0, -10, 8);
    cockpitGrad.addColorStop(0, '#fff');
    cockpitGrad.addColorStop(0.4, '#8df');
    cockpitGrad.addColorStop(1, '#16c');
    ctx.fillStyle = cockpitGrad;
    ctx.beginPath();
    ctx.ellipse(0, -10, 5, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  getBounds() {
    return { x: this.x - 14, y: this.y - 20, w: 28, h: 40 };
  }
}

// ========== 敌机 ==========
class Enemy {
  constructor(type) {
    this.type = type || 'normal';
    this.reset();
  }

  reset() {
    this.x = Math.random() * (W - 40) + 20;
    this.y = -50;
    this.active = true;

    switch (this.type) {
      case 'normal':
        this.w = 32; this.h = 36;
        this.hp = 1;
        this.speed = 1.5 + Math.random() * 2;
        this.score = 100;
        this.color = '#e44';
        this.canShoot = Math.random() < 0.1;
        this.shootTimer = 60 + Math.random() * 60;
        break;
      case 'fast':
        this.w = 26; this.h = 28;
        this.hp = 1;
        this.speed = 3 + Math.random() * 2.5;
        this.score = 150;
        this.color = '#f80';
        this.canShoot = false;
        this.shootTimer = 0;
        this.waveAmp = Math.random() * 2 + 1;
        this.waveFreq = Math.random() * 0.05 + 0.03;
        this.waveOffset = Math.random() * Math.PI * 2;
        break;
      case 'tank':
        this.w = 44; this.h = 50;
        this.hp = 3;
        this.speed = 1 + Math.random() * 0.8;
        this.score = 300;
        this.color = '#a5f';
        this.canShoot = true;
        this.shootTimer = 40 + Math.random() * 40;
        break;
      case 'boss':
        this.w = 70; this.h = 60;
        this.hp = 15 + level * 5;
        this.maxHp = this.hp;
        this.speed = 0.8;
        this.score = 2000;
        this.color = '#f22';
        this.canShoot = true;
        this.shootTimer = 20;
        this.targetX = W / 2;
        this.entering = true;
        break;
    }
    this.shootCooldown = this.shootTimer;
  }

  update() {
    this.y += this.speed;

    switch (this.type) {
      case 'fast':
        this.x += Math.sin(this.y * this.waveFreq + this.waveOffset) * this.waveAmp;
        break;
      case 'boss':
        if (this.entering) {
          if (this.y >= 60) this.entering = false;
        } else {
          const dx = this.targetX - this.x;
          this.x += Math.sign(dx) * Math.min(Math.abs(dx), 1.5);
          if (Math.abs(dx) < 5) this.targetX = Math.random() * (W - 100) + 50;
        }
        break;
    }

    this.x = Math.max(this.w / 2, Math.min(W - this.w / 2, this.x));

    if (this.canShoot) {
      this.shootCooldown--;
      if (this.shootCooldown <= 0) {
        this.shootCooldown = this.shootTimer;
        this.shoot();
      }
    }

    if (this.y > H + 60) this.active = false;
  }

  shoot() {
    if (this.type === 'boss') {
      for (let a = -2; a <= 2; a++) {
        enemyBullets.push(new Bullet(this.x + a * 10, this.y + 20, a * 1.2, 3.5));
      }
    } else {
      enemyBullets.push(new Bullet(this.x, this.y + 20, 0, 3.5));
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.type === 'boss') this.drawBoss(ctx);
    else this.drawNormal(ctx);

    if (this.hp > 1 || this.type === 'tank') {
      const barW = this.w, barH = 4;
      ctx.fillStyle = '#333';
      ctx.fillRect(-barW / 2, -this.h / 2 - 10, barW, barH);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(-barW / 2, -this.h / 2 - 10, barW * (this.hp / this.maxHp), barH);
    }
    ctx.restore();
  }

  drawNormal(ctx) {
    ctx.fillStyle = '#f84';
    ctx.beginPath();
    ctx.moveTo(-6, this.h / 2 - 2);
    ctx.lineTo(0, this.h / 2 + 8 + Math.random() * 4);
    ctx.lineTo(6, this.h / 2 - 2);
    ctx.fill();

    const grad = ctx.createLinearGradient(0, -this.h / 2, 0, this.h / 2);
    grad.addColorStop(0, this.color);
    grad.addColorStop(1, '#333');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -this.h / 2);
    ctx.lineTo(this.w / 2, this.h / 4);
    ctx.lineTo(this.w / 2 - 4, this.h / 2);
    ctx.lineTo(-this.w / 2 + 4, this.h / 2);
    ctx.lineTo(-this.w / 2, this.h / 4);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.fillRect(-3, -2, 6, 8);
  }

  drawBoss(ctx) {
    ctx.fillStyle = '#f62';
    for (let ex of [-20, 0, 20]) {
      ctx.beginPath();
      ctx.moveTo(ex - 5, this.h / 2 - 5);
      ctx.lineTo(ex, this.h / 2 + 12 + Math.random() * 6);
      ctx.lineTo(ex + 5, this.h / 2 - 5);
      ctx.fill();
    }

    const grad = ctx.createLinearGradient(0, -this.h / 2, 0, this.h / 2);
    grad.addColorStop(0, '#d00');
    grad.addColorStop(0.5, '#900');
    grad.addColorStop(1, '#500');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -this.h / 2);
    ctx.lineTo(this.w / 2, -this.h / 6);
    ctx.lineTo(this.w / 2, this.h / 3);
    ctx.lineTo(this.w / 3, this.h / 2);
    ctx.lineTo(-this.w / 3, this.h / 2);
    ctx.lineTo(-this.w / 2, this.h / 3);
    ctx.lineTo(-this.w / 2, -this.h / 6);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#700';
    ctx.beginPath();
    ctx.moveTo(-this.w / 2 + 5, 0);
    ctx.lineTo(-this.w / 2 - 15, 8);
    ctx.lineTo(-this.w / 2 - 10, 16);
    ctx.lineTo(-this.w / 2 + 5, 8);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(this.w / 2 - 5, 0);
    ctx.lineTo(this.w / 2 + 15, 8);
    ctx.lineTo(this.w / 2 + 10, 16);
    ctx.lineTo(this.w / 2 - 5, 8);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('☠', 0, 4);
  }

  getBounds() {
    return { x: this.x - this.w / 2, y: this.y - this.h / 2, w: this.w, h: this.h };
  }
}

// ========== 碰撞检测 ==========
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ========== 游戏对象 ==========
let player = new Player();
let enemies = [];
let enemySpawnTimer = 0;
let bossSpawnScore = 0;
const BOSS_INTERVAL = 3000;

// ========== 输入处理 ==========
const keys = {};

// 键盘
window.addEventListener('keydown', e => {
  keys[e.code] = true;

  if (e.code === 'Space') {
    if (gameState === STATE.MENU) startGame();
    else if (gameState === STATE.OVER) startGame();
  }
  if (e.code === 'KeyP') {
    if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
    else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// ========== 触摸支持（相对移动模式） ==========
let touchId = null;
let touchStartX = 0, touchStartY = 0;
let touchDX = 0, touchDY = 0;
let touchActive = false;

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height)
  };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === STATE.MENU || gameState === STATE.OVER) {
    startGame();
    return;
  }
  // 取第一个触摸点作为移动控制
  if (touchId === null) {
    const t = e.changedTouches[0];
    touchId = t.identifier;
    const pos = getCanvasPos(t);
    touchStartX = pos.x;
    touchStartY = pos.y;
    touchDX = 0;
    touchDY = 0;
    touchActive = true;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (t.identifier === touchId) {
      const pos = getCanvasPos(t);
      // 使用差值作为移动增量，手指不会挡住飞机
      touchDX = pos.x - touchStartX;
      touchDY = pos.y - touchStartY;
      touchStartX = pos.x;
      touchStartY = pos.y;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchId = null;
      touchDX = 0;
      touchDY = 0;
      touchActive = false;
    }
  }
}, { passive: false });

canvas.addEventListener('touchcancel', () => {
  touchId = null;
  touchDX = 0;
  touchDY = 0;
  touchActive = false;
});

// 鼠标也支持（PC拖拽模式）
canvas.addEventListener('mousedown', e => {
  if (gameState === STATE.MENU || gameState === STATE.OVER) {
    startGame();
    return;
  }
  touchActive = true;
  const pos = getCanvasPos(e);
  touchStartX = pos.x;
  touchStartY = pos.y;
  touchDX = 0;
  touchDY = 0;
});
canvas.addEventListener('mousemove', e => {
  if (!touchActive) return;
  const pos = getCanvasPos(e);
  touchDX = pos.x - touchStartX;
  touchDY = pos.y - touchStartY;
  touchStartX = pos.x;
  touchStartY = pos.y;
});
canvas.addEventListener('mouseup', () => {
  touchActive = false;
  touchDX = 0;
  touchDY = 0;
});
canvas.addEventListener('mouseleave', () => {
  touchActive = false;
  touchDX = 0;
  touchDY = 0;
});

// ========== 游戏流程 ==========
function startGame() {
  score = 0;
  lives = 3;
  level = 1;
  player.reset();
  enemies = [];
  bullets = [];
  enemyBullets = [];
  powerUps = [];
  particles = [];
  enemySpawnTimer = 0;
  bossSpawnScore = BOSS_INTERVAL;
  invincibleTimer = 0;
  touchDX = 0; touchDY = 0;
  gameState = STATE.PLAYING;
  updateUI();
}

function playerHit() {
  if (invincibleTimer > 0 || gameState !== STATE.PLAYING) return;

  if (player.shieldActive) {
    player.shieldActive = false;
    player.shieldTimer = 0;
    spawnExplosion(player.x, player.y, 15, 'rgba(0,255,100,1)');
    invincibleTimer = 60;
    return;
  }

  lives--;
  invincibleTimer = 90;
  shakeTimer = 20;
  shakeIntensity = 8;
  spawnExplosion(player.x, player.y, 25, 'rgba(255,200,50,1)');
  updateUI();

  if (lives <= 0) gameOver();
}

function gameOver() {
  gameState = STATE.OVER;
  spawnExplosion(player.x, player.y, 50, 'rgba(255,100,0,1)');
  spawnExplosion(player.x, player.y, 30, 'rgba(255,255,100,1)');
}

function addScore(pts) {
  score += pts;
  bossSpawnScore -= pts;
  const newLevel = Math.floor(score / 1000) + 1;
  if (newLevel > level) {
    level = newLevel;
    spawnExplosion(W / 2, H / 2, 20, 'rgba(100,200,255,1)');
  }
  updateUI();
}

function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
  levelEl.textContent = level;
}

// ========== 敌机生成 ==========
function spawnEnemy() {
  if (bossSpawnScore <= 0 && !enemies.some(e => e.type === 'boss')) {
    enemies.push(new Enemy('boss'));
    bossSpawnScore = BOSS_INTERVAL + level * 500;
    return;
  }
  const rand = Math.random();
  let type;
  if (rand < 0.55) type = 'normal';
  else if (rand < 0.8) type = 'fast';
  else type = 'tank';
  enemies.push(new Enemy(type));
}

// ========== 道具掉落 ==========
function maybeDropPowerUp(x, y) {
  if (Math.random() < 0.08) {
    const types = ['double', 'shield', 'heal', 'bomb'];
    const r = Math.random();
    let type = 'double';
    if (r < 0.35) type = 'double';
    else if (r < 0.6) type = 'shield';
    else if (r < 0.85) type = 'heal';
    else type = 'bomb';
    powerUps.push(new PowerUp(x, y, type));
  }
}

function applyPowerUp(pu) {
  switch (pu.type) {
    case 'double':
      player.doubleFire = true;
      player.doubleTimer = 480;
      break;
    case 'shield':
      player.shieldActive = true;
      player.shieldTimer = 600;
      break;
    case 'heal':
      if (lives < 5) lives++;
      updateUI();
      spawnExplosion(player.x, player.y, 10, 'rgba(255,0,255,1)');
      break;
    case 'bomb':
      enemies.forEach(e => {
        addScore(e.score);
        spawnExplosion(e.x, e.y, 12, 'rgba(255,100,0,1)');
      });
      enemyBullets = [];
      enemies = [];
      shakeTimer = 10;
      shakeIntensity = 5;
      break;
  }
}

// ========== 射击 ==========
function playerShoot() {
  if (bulletCooldown > 0) return;
  bullets.push(new Bullet(player.x, player.y - 20));
  if (player.doubleFire) {
    bullets.push(new Bullet(player.x - 10, player.y - 16));
    bullets.push(new Bullet(player.x + 10, player.y - 16));
    bulletCooldown = 8;
  } else {
    bulletCooldown = BULLET_INTERVAL;
  }
}

// ========== 主循环 ==========
function update() {
  stars.forEach(s => s.update());
  particles = particles.filter(p => { p.update(); return !p.dead; });

  if (gameState !== STATE.PLAYING) return;

  if (bulletCooldown > 0) bulletCooldown--;
  if (invincibleTimer > 0) invincibleTimer--;
  if (shakeTimer > 0) shakeTimer--;

  // 玩家移动
  player.update(keys, touchDX, touchDY);
  // 每帧消耗触摸增量
  touchDX *= 0.7;
  touchDY *= 0.7;
  if (Math.abs(touchDX) < 0.1) touchDX = 0;
  if (Math.abs(touchDY) < 0.1) touchDY = 0;

  // 自动射击
  playerShoot();
  if (keys['Space']) bulletCooldown = Math.max(0, bulletCooldown - 1);

  // 子弹更新
  bullets.forEach(b => b.update());
  bullets = bullets.filter(b => b.active);
  enemyBullets.forEach(b => b.update());
  enemyBullets = enemyBullets.filter(b => b.active);

  // 敌机生成
  enemySpawnTimer--;
  const spawnRate = Math.max(20, 60 - level * 3);
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = spawnRate + Math.random() * 20;
  }

  // 敌机更新
  enemies.forEach(e => e.update());
  enemies = enemies.filter(e => e.active);

  // 道具更新
  powerUps.forEach(p => p.update());
  powerUps = powerUps.filter(p => p.y < H + 30);

  // 子弹 vs 敌机
  for (let b of bullets) {
    if (!b.active) continue;
    for (let e of enemies) {
      if (!e.active) continue;
      if (rectCollide(
        { x: b.x - b.w / 2, y: b.y - b.h / 2, w: b.w, h: b.h },
        e.getBounds()
      )) {
        b.active = false;
        e.hp--;
        spawnExplosion(b.x, b.y, 3, 'rgba(255,255,200,1)');
        if (e.hp <= 0) {
          e.active = false;
          addScore(e.score);
          spawnExplosion(e.x, e.y, 18, 'rgba(255,' + (e.type === 'boss' ? '50' : '150') + ',0,1)');
          maybeDropPowerUp(e.x, e.y);
        }
        break;
      }
    }
  }

  // 敌机/敌弹 vs 玩家
  if (invincibleTimer <= 0) {
    for (let e of enemies) {
      if (!e.active) continue;
      if (rectCollide(player.getBounds(), e.getBounds())) {
        e.active = false;
        spawnExplosion(e.x, e.y, 15, 'rgba(255,150,0,1)');
        playerHit();
        break;
      }
    }
    for (let b of enemyBullets) {
      if (!b.active) continue;
      if (rectCollide(
        { x: b.x - b.w / 2, y: b.y - b.h / 2, w: b.w, h: b.h },
        player.getBounds()
      )) {
        b.active = false;
        playerHit();
        break;
      }
    }
  }

  // 道具 vs 玩家
  for (let pu of powerUps) {
    if (rectCollide(
      { x: pu.x - pu.w / 2, y: pu.y - pu.h / 2, w: pu.w, h: pu.h },
      player.getBounds()
    )) {
      pu.y = -999;
      applyPowerUp(pu);
    }
  }
  powerUps = powerUps.filter(p => p.y > -100);

  updateUI();
}

// ========== 渲染 ==========
function draw() {
  ctx.clearRect(0, 0, W, H);

  let sx = 0, sy = 0;
  if (shakeTimer > 0) {
    sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
    sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
  }

  ctx.save();
  ctx.translate(sx, sy);

  stars.forEach(s => s.draw(ctx));
  powerUps.forEach(p => p.draw(ctx));
  bullets.forEach(b => b.draw(ctx));

  enemyBullets.forEach(b => {
    ctx.fillStyle = '#f44';
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  enemies.forEach(e => e.draw(ctx));

  if (gameState !== STATE.OVER) {
    if (invincibleTimer <= 0 || Math.floor(invincibleTimer / 5) % 2 === 0) {
      player.draw(ctx);
    }
  }

  particles.forEach(p => p.draw(ctx));

  ctx.restore();

  // === 覆盖层 ===

  // 开始菜单
  if (gameState === STATE.MENU) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('✈️ 飞机大战 ✈️', W / 2, H / 2 - 100);

    ctx.font = '18px Arial';
    ctx.fillStyle = '#8af';
    if (isTouchDevice) {
      ctx.fillText('👆 滑动屏幕移动飞机', W / 2, H / 2 - 10);
      ctx.fillText('🔫 自动射击，拾取道具增强', W / 2, H / 2 + 25);
    } else {
      ctx.fillText('🎮 方向键 / WASD / 鼠标拖拽', W / 2, H / 2 - 20);
      ctx.fillText('🔫 自动射击 (空格键加速)', W / 2, H / 2 + 15);
      ctx.fillText('📱 也支持触屏操作', W / 2, H / 2 + 50);
    }

    const alpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.5;
    ctx.fillStyle = `rgba(255,255,100,${alpha})`;
    ctx.font = 'bold 24px Arial';
    ctx.fillText(isTouchDevice ? '点击屏幕开始游戏' : '按 空格键 或 点击屏幕 开始', W / 2, H / 2 + 110);

    ctx.textAlign = 'start';
  }

  // 暂停
  if (gameState === STATE.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', W / 2, H / 2);
    ctx.font = '18px Arial';
    ctx.fillStyle = '#aaa';
    ctx.fillText('按 P 键继续', W / 2, H / 2 + 40);
    ctx.textAlign = 'start';
  }

  // Game Over
  if (gameState === STATE.OVER) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#f44';
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);

    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 22px Arial';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 + 10);

    ctx.fillStyle = '#fff';
    ctx.font = '16px Arial';
    ctx.fillText(`达到等级: ${level}`, W / 2, H / 2 + 42);

    const alpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.5;
    ctx.fillStyle = `rgba(255,255,100,${alpha})`;
    ctx.font = 'bold 20px Arial';
    ctx.fillText(isTouchDevice ? '点击屏幕重新开始' : '按 空格键 或 点击屏幕 重新开始', W / 2, H / 2 + 90);

    ctx.textAlign = 'start';
  }

  // 道具状态
  if (gameState === STATE.PLAYING) {
    let indicatorY = 60;
    ctx.textAlign = 'right';
    if (player.doubleFire) {
      ctx.fillStyle = '#0ff';
      ctx.font = 'bold 13px Arial';
      ctx.fillText(`⚡ 双倍火力 ${Math.ceil(player.doubleTimer / 60)}s`, W - 15, indicatorY);
      indicatorY += 20;
    }
    if (player.shieldActive) {
      ctx.fillStyle = '#0f0';
      ctx.font = 'bold 13px Arial';
      ctx.fillText(`🛡 护盾 ${Math.ceil(player.shieldTimer / 60)}s`, W - 15, indicatorY);
    }
    ctx.textAlign = 'start';
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ========== 启动 ==========
updateUI();
gameLoop();
</script>
</body>
</html>
